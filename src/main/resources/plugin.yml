name: Logger
main: dev.logger.LoggerPlugin
version: 1.0.0
api-version: 1.26
author: kavaliersdelikt
description: A container-safe async JSON logger with Discord webhook integration and player tracking GUI.
commands:
  logger:
    description: Open logger tracking UI or inspect a player
    usage: /<command> [inspect <player>]
    permission: logger.use
permissions:
  logger.use:
    description: Allows access to logger admin commands and GUI
    default: op
