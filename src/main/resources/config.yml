# Logger plugin configuration
# This is intentionally simple and ready for future upgrades:
# - JSON formatting upgrades
# - log rotation rules
# - per-world filters
# - performance scaling

enable-file-logging: true
log-folder: logs
log-file-pattern: logger-%DATE%.json
log-rotation:
  enabled: true
  max-file-size-bytes: 10485760
log-json-pretty: false

enable-discord: true
discord-webhook-url: ""
discord-timeout-ms: 5000
discord-queue-max-size: 1000
discord-flush-interval-ms: 1500
discord-backoff-ms: 5000
discord-max-retries: 3

web-panel:
  enabled: false
  host: 0.0.0.0
  port: 8080
  auth-enabled: true
  username: admin
  password: change-me

thread-pool-size: 4
max-player-cache: 200

world-filters:
  enabled: false
  allowed: []
  excluded: []
